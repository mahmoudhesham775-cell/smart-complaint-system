<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع شكوى</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { color: #2c3e50; text-align: center; }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        textarea { height: 150px; resize: none; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background: #2980b9; }
        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📨 رفع شكوى جديدة</h2>
        <form method="POST">
            <input type="text" name="title" 
            placeholder="عنوان الشكوى" required>
            <textarea name="description" 
            placeholder="اكتب تفاصيل الشكوى هنا..." required></textarea>
            <button type="submit" class="btn">إرسال الشكوى</button>
        </form>
        <a href="/dashboard" class="back">← رجوع للداشبورد</a>
    </div>
</body>
</html>
