<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complaint Submitted</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
        }
        .icon { font-size: 60px; margin-bottom: 10px; }
        h2 { color: #2c3e50; }
        p { color: #7f8c8d; }
        .category {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            margin: 10px 0;
        }
        .IT { background: #d5e8ff; color: #1a5fa8; }
        .Academic { background: #d5ffd8; color: #1a7a1e; }
        .Finance { background: #fff3d5; color: #a87c1a; }
        .General { background: #f0f0f0; color: #555; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #3498db;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h2>Complaint Submitted Successfully!</h2>
        <p>Our AI has classified your complaint to the:</p>
        <div class="category {{ category }}">{{ category }} Department</div>
        <p>Your complaint will be reviewed as soon as possible 🙏</p>
        <a href="/" class="btn">Submit Another Complaint</a>
    </div>
</body>
</html>
